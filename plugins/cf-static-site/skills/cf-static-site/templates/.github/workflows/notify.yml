name: Notify <DOMAIN>

on:
  push:
    branches: [<STATUS_BRANCH>]
    paths: [<STATUS_FILE_PATH>]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger <DOMAIN> rebuild
        run: |
          curl -fsSX POST \
            -H "Authorization: token ${{ secrets.<SLUG_UPPER>_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/<GH_USER>/<DOMAIN>/dispatches \
            -d '{"event_type":"<SLUG>-status-updated"}'
